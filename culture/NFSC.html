<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Need For Speed Carbon - NDS</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: black;
        }
        #game {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="game"></div>

    <script>
        EJS_player = "#game";
        EJS_core = "nds";
        EJS_gameName = "Need For Speed Carbon";
        EJS_color = "#0064ff";

        // IMPORTANTE: ruta correcta al ROM
        EJS_gameUrl = "./NFSC.zip";

        // CDN del emulador
        EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

        // Inicia automáticamente
        EJS_startOnLoaded = true;
    </script>

    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
