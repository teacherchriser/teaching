<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encuesta</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    .container {
      max-width: 500px;
      margin: 20px auto;
      padding: 20px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-weight: bold;
      margin-top: 1rem;
      margin-bottom: 0.4rem;
    }
    input, textarea, button {
      width: 95%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    button {
      margin-top: 1.2rem;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border: none;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #1d4ed8;
    }
    @media (max-width: 500px) {
      .container {
        margin: 10px;
        padding: 15px;
      }
      h2 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Encuesta</h2>
    <form action="guardar-p.php" method="POST">
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" required />

      <label for="correo">Correo:</label>
      <input type="email" id="correo" name="correo" required />

      <label for="opinion">¿Qué opinas de esta herramienta?</label>
      <textarea id="opinion" name="opinion" required></textarea>

      <button type="submit">Enviar</button>
    </form>
  </div>
</body>
</html>
